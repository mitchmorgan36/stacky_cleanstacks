name: Build Stacky

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Release Win32
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build stacky.exe
        run: msbuild vsproj\stacky.sln /m /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

      - name: Upload stacky.exe
        uses: actions/upload-artifact@v4
        with:
          name: stacky-release-win32
          path: vsproj\x86\Release\stacky.exe
          if-no-files-found: error
